<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College ID Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>College ID Verification</h1>

        <input type="file" id="imageInput" accept="image/*">

        <br><br>

        <img id="preview" src="" alt="Image Preview" style="display:none; max-width:250px; border-radius:10px;">

        <br><br>

        <button id="verifyBtn">Verify ID</button>

        <div id="result">
            Upload an image and click Verify.
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
